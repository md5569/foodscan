<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 식품 안전 스캐너 Pro</title>
    <style>
        :root { --primary: #1a365d; --success: #48bb78; --warning: #ed8936; --danger: #f56565; }
        body { font-family: -apple-system, sans-serif; background: #f7fafc; margin: 0; padding: 15px; color: #2d3748; }
        .container { width: 100%; max-width: 480px; margin: 0 auto; }
        
        .card { background: #fff; border-radius: 20px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); margin-bottom: 20px; }
        h2 { text-align: center; margin-top: 0; color: var(--primary); font-size: 1.5rem; }
        
        /* 카메라 스캔 영역 */
        #reader { width: 100%; border-radius: 15px; overflow: hidden; background: #000; border: 4px solid var(--primary); margin-bottom: 10px; }
        .scan-tip { text-align: center; font-size: 0.8rem; color: #718096; margin-bottom: 15px; }

        /* 입력 그룹 */
        .input-group { display: flex; gap: 8px; margin-bottom: 15px; }
        input { flex: 1; padding: 14px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 16px; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--primary); }
        .btn-search { padding: 0 20px; background: var(--primary); color: #fff; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }

        /* 결과창 디자인 */
        .result-box { display: none; padding: 20px; border-radius: 15px; color: white; margin-top: 10px; animation: slideUp 0.3s ease; }
        .good { background: var(--success); }
        .soso { background: var(--warning); }
        .bad { background: var(--danger); }
        
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
