<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>뚱땡이 아빠의 AI 식품 안전 스캐너</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;700;900&display=swap"
        rel="stylesheet">
    <!-- QR Code Scanner -->
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root {
            --primary: #FF5A5F;
            --primary-hover: #E34A4F;
            --success: #32D74B;
            --warning: #FFD60A;
            --danger: #FF453A;
            --bg-gradient: linear-gradient(135deg, #0d0d0f 0%, #1c1c1e 100%);
            --card-glass: rgba(28, 28, 30, 0.7);
            --text-light: #F2F2F7;
            --text-muted: #8E8E93;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            margin: 0;
            padding: 20px 15px 40px;
            color: var(--text-light);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        .app-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .app-emoji {
            font-size: 3.5rem;
            margin-bottom: -10px;
            display: inline-block;
            animation: bounce 2s infinite ease-in-out;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        h2 {
            font-family: 'Jua', sans-serif;
            margin-top: 0;
            color: #FFF;
            font-size: 2.2rem;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.8);
            margin-bottom: 25px;
        }

        .highlight {
            color: var(--primary);
        }

        .card {
            background: var(--card-glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
            padding: 25px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
        }

        /* 컨트롤 영역 */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            font-size: 16px;
            font-weight: 700;
            background: rgba(0, 0, 0, 0.4);
            color: #FFF;
            outline: none;
            transition: all 0.3s;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(255, 90, 95, 0.2);
        }

        button {
            padding: 16px 20px;
            color: #fff;
            border: none;
            border-radius: 16px;
            font-weight: 900;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        button:active {
            transform: scale(0.95);
        }

        .btn-search {
            background: var(--primary);
            box-shadow: 0 8px 20px rgba(255, 90, 95, 0.4);
        }

        .btn-camera {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.05) 100%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            width: 100%;
        }

        .btn-camera.active {
            background: rgba(255, 69, 58, 0.8);
            border-color: #FF453A;
        }

        #reader {
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 20px;
            display: none;
            border: 2px solid var(--primary);
            background: #000;
        }

        /* 결과 화면 */
        .result-box {
            display: none;
            position: relative;
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .brand-text {
            font-family: 'Jua', sans-serif;
            font-size: 1.2rem;
            color: var(--primary);
            margin-bottom: 4px;
        }

        .product-title {
            font-size: 1.6rem;
            font-weight: 900;
            line-height: 1.3;
            margin: 0 0 20px 0;
            color: #FFF;
        }

        .product-img {
            width: 100%;
            height: auto;
            max-height: 280px;
            object-fit: cover;
            border-radius: 20px;
            margin-bottom: 25px;
            background: #000;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
        }

        /* Yuka 스타일 메트릭 그리드 */
        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 25px;
        }

        .metric-card {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 16px;
            text-align: center;
            box-shadow: inset 0 2px 5px rgba(255, 255, 255, 0.02);
        }

        .metric-title {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 700;
            margin-bottom: 8px;
        }

        .metric-value {
            font-size: 1.3rem;
            font-family: 'Jua', sans-serif;
            color: #FFF;
        }

        .metric-good {
            color: var(--success);
        }

        .metric-bad {
            color: var(--danger);
            text-shadow: 0 0 10px rgba(255, 69, 58, 0.5);
        }

        .metric-warn {
            color: var(--warning);
        }

        /* 경고 뱃지 뷰 */
        .warning-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;
        }

        .warning-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 16px;
            border-left: 5px solid transparent;
        }

        .warning-item h4 {
            margin: 0 0 8px 0;
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        .warning-item.danger {
            border-color: var(--danger);
            background: rgba(255, 69, 58, 0.1);
        }

        .warning-item.warning {
            border-color: var(--warning);
            background: rgba(255, 214, 10, 0.1);
        }

        .badge-text {
            font-weight: 800;
            font-size: 1rem;
            color: #FFF;
            line-height: 1.5;
        }

        /* 쇼핑몰 4종 비교 대시보드 */
        .store-dashboard {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .store-header {
            text-align: center;
            font-family: 'Jua', sans-serif;
            font-size: 1.4rem;
            color: #FFF;
            margin-bottom: 20px;
        }

        .store-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .store-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.02) 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 15px 10px;
            text-decoration: none;
            transition: all 0.2s;
        }

        .store-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-3px);
        }

        .store-name {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .store-price {
            font-size: 1.1rem;
            font-family: 'Jua', sans-serif;
            color: #FFF;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .s-naver .store-name {
            color: #03C75A;
        }

        .s-coupang .store-name {
            color: #CB1400;
        }

        .s-amazon .store-name {
            color: #FF9900;
        }

        .s-google .store-name {
            color: #4285F4;
        }

        .loading {
            text-align: center;
            padding: 40px 20px;
            font-weight: 900;
            font-size: 1.2rem;
            color: var(--primary);
            display: none;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        @keyframes slideUp {
            from {
                transform: translateY(40px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div class="container">

        <div class="app-header">
            <div class="app-emoji">👨‍👧‍👦</div>
            <h2>뚱땡이 아빠의<br><span class="highlight">AI 식품 안전 스캐너</span></h2>
        </div>

        <div class="card">

            <div class="controls">
                <button type="button" class="btn-camera" id="cameraBtn">
                    📸 스마트폰 카메라로 스캔하기
                </button>
                <div id="reader"></div>

                <div class="input-group">
                    <input type="tel" id="barcode" placeholder="바코드 숫자 입력" />
                    <button class="btn-search" id="searchBtn">검색</button>
                </div>
            </div>

            <div class="loading" id="loading">영양 성분을 꼼꼼히 분석 중입니다... 🔬</div>

            <div class="result-box" id="resultBox">
                <div class="brand-text" id="brandText"></div>
                <h3 class="product-title" id="productName"></h3>
                <img id="productImg" class="product-img" src="" alt="제품 사진" style="display: none;" />

                <!-- Yuka 스타일 메트릭 그리드 -->
                <div class="metrics-grid">
                    <div class="metric-card">
                        <div class="metric-title">🛡️ 종합 안전 점수</div>
                        <div class="metric-value" id="score"></div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-title">🔥 칼로리 (100g)</div>
                        <div class="metric-value" id="calories"></div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-title">🧪 가공 등급</div>
                        <div class="metric-value metric-warn" id="nova"></div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-title">🌍 친환경 (Eco)</div>
                        <div class="metric-value metric-good" id="ecoscore"></div>
                    </div>
                </div>

                <!-- 경고 뱃지 구역 -->
                <div class="warning-list">
                    <div class="warning-item danger">
                        <h4>⚠️ 주의해야 할 유해 성분</h4>
                        <div class="badge-text" id="badIngredients"></div>
                    </div>
                    <div class="warning-item warning">
                        <h4>🤧 알레르기 유발 물질</h4>
                        <div class="badge-text" id="allergens"></div>
                    </div>
                </div>

                <!-- 실시간 4대 스토어 다이렉트 대시보드 -->
                <div class="store-dashboard">
                    <div class="store-header">💰 글로벌 최저가 실시간 비교</div>
                    <div class="store-grid" id="storeGrid">
                        <!-- JS에서 버튼들이 생성됨 -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const searchBtn = document.getElementById('searchBtn');
        const cameraBtn = document.getElementById('cameraBtn');
        const barcodeInput = document.getElementById('barcode');
        const resultBox = document.getElementById('resultBox');
        const loadingEl = document.getElementById('loading');
        const readerEl = document.getElementById('reader');

        const storeGrid = document.getElementById('storeGrid');

        let html5QrCode = null;
        let isCameraActive = false;

        cameraBtn.addEventListener('click', async () => {
            if (isCameraActive) await stopCamera();
            else startCamera();
        });

        function startCamera() {
            if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
            readerEl.style.display = 'block';
            cameraBtn.innerHTML = '⏹ 스캔 취소하기';
            cameraBtn.classList.add('active');
            isCameraActive = true;
            resultBox.style.display = 'none';

            html5QrCode.start(
                { facingMode: "environment" },
                { fps: 15, qrbox: { width: 250, height: 180 } },
                (decodedText) => {
                    barcodeInput.value = decodedText;
                    stopCamera();
                    handleSearch(decodedText);
                },
                (err) => { }
            ).catch(err => {
                alert('카메라 실행 실패. 브라우저 설정에서 카메라 권한을 허용해주세요.');
                stopCamera();
            });
        }

        async function stopCamera() {
            if (html5QrCode && isCameraActive) {
                try { await html5QrCode.stop(); } catch (err) { }
                html5QrCode.clear();
            }
            readerEl.style.display = 'none';
            cameraBtn.innerHTML = '📸 스마트폰 카메라로 스캔하기';
            cameraBtn.classList.remove('active');
            isCameraActive = false;
        }

        async function handleSearch(manualBarcode = null) {
            const barcode = manualBarcode || barcodeInput.value.trim();
            if (!barcode) { alert('바코드를 입력하거나 카메라를 켜주세요!'); return; }
            if (isCameraActive) await stopCamera();

            resultBox.style.display = 'none';
            loadingEl.style.display = 'block';

            try {
                // 1차: 상품 정보 긁어오기
                const res1 = await fetch(`/api/scan?barcode=${barcode}`);
                const productData = await res1.json();

                if (!productData || !productData.success) {
                    loadingEl.style.display = 'none';
                    alert('뚱땡이 아빠의 DB에 없는 희귀한 상품입니다! 🥲');
                    return;
                }

                // 2차: 가져온 '상품명'을 기준으로 4대 쇼핑몰 연동
                const res2 = await fetch(`/api/price?barcode=${barcode}&productName=${encodeURIComponent(productData.productName)}`);
                const priceData = await res2.json();

                loadingEl.style.display = 'none';
                renderResult(productData, priceData);
            } catch (e) {
                loadingEl.style.display = 'none';
                alert('네트워크 또는 서버 에러가 발생했습니다.');
            }
        }

        function renderResult(data, priceData) {
            document.getElementById('brandText').textContent = data.brand || '브랜드 정보 없음';
            document.getElementById('productName').textContent = data.productName;

            const img = document.getElementById('productImg');
            if (data.image) { img.src = data.image; img.style.display = 'block'; }
            else { img.style.display = 'none'; }

            // Metrics
            const sc = document.getElementById('score');
            sc.textContent = `${data.score}점`;
            sc.className = 'metric-value ' + (data.score >= 80 ? 'metric-good' : (data.score >= 50 ? 'metric-warn' : 'metric-bad'));

            document.getElementById('calories').textContent = data.calories || '?';
            document.getElementById('nova').textContent = data.nova || '?';

            const eco = document.getElementById('ecoscore');
            eco.textContent = data.ecoscore || '?';
            if (data.ecoscore && (data.ecoscore === 'A' || data.ecoscore === 'B')) eco.className = 'metric-value metric-good';
            else eco.className = 'metric-value';

            // Warnings
            const badList = Array.isArray(data.badIngredients) ? data.badIngredients.join(', ') : data.badIngredients;
            document.getElementById('badIngredients').textContent = badList;
            document.getElementById('allergens').textContent = data.allergens || '없음';

            // Store Grid
            storeGrid.innerHTML = '';
            if (priceData && priceData.stores) {
                priceData.stores.forEach(store => {
                    const btn = document.createElement('a');
                    btn.href = store.url;
                    btn.target = "_blank";
                    btn.className = `store-btn s-${store.id}`;

                    const nameDiv = document.createElement('div');
                    nameDiv.className = 'store-name';
                    nameDiv.textContent = store.name;

                    const priceDiv = document.createElement('div');
                    priceDiv.className = 'store-price';
                    priceDiv.textContent = store.price;

                    btn.appendChild(nameDiv);
                    btn.appendChild(priceDiv);
                    storeGrid.appendChild(btn);
                });
            }

            resultBox.style.display = 'block';
        }

        searchBtn.addEventListener('click', () => handleSearch());
        barcodeInput.addEventListener('keypress', e => { if (e.key === 'Enter') handleSearch(); });
    </script>
</body>

</html>
