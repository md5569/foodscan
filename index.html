<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 식품 안전 스캐너 Pro</title>
    <style>
        :root { --primary: #1a365d; --success: #48bb78; --warning: #ed8936; --danger: #f56565; }
        body { font-family: -apple-system, sans-serif; background-color: #f7fafc; margin: 0; padding: 15px; color: #2d3748; }
        .container { width: 100%; max-width: 480px; margin: 0 auto; }
        .card { background: #fff; border-radius: 16px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; }
        h2 { text-align: center; margin-top: 0; color: var(--primary); font-size: 1.5rem; }
        
        #reader { width: 100%; border-radius: 12px; overflow: hidden; background: #000; margin-bottom: 15px; }
        .input-group { display: flex; gap: 8px; margin-bottom: 10px; }
        input { flex: 1; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 16px; }
        .btn-search { padding: 0 20px; background: var(--primary); color: #fff; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        
        .result-box { display: none; padding: 20px; border-radius: 12px; color: white; margin-top: 10px; transition: all 0.3s; }
        .result-box.good { background-color: var(--success); }
        .result-box.soso { background-color: var(--warning); }
        .result-box.bad { background-color: var(--danger); }
        
        .history-section { margin-top: 25px; }
        .history-item { display: flex; justify-content: space-between; padding: 12px; background: #fff; border-radius: 8px; margin-bottom: 8px; font-size: 14px; border-left: 5px solid var(--primary); }
        .btn-link { display: block; width: 100%; padding: 12px; background: rgba(255,255,255,0.2); color: #fff; text-align: center; border-radius: 8px; text-decoration: none; margin-top: 15px; font-weight: bold; border: 1px solid white; }
    </style>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2>🔍 식품 안전 스캐너</h2>
            <div id="reader"></div>
            <div class="input-group">
                <input type="number" id="manualBarcode" placeholder="바코드 숫자 입력" inputmode="numeric">
                <button class="btn-search" onclick="searchManual()">조회</button>
            </div>
            
            <div id="resultBox" class="result-box">
                <h3 id="pName" style="margin:0 0 10px 0;">상품명</h3>
                <p>⚠️ 위험성분: <span id="pBad">-</span></p>
                <p>⭐ 안전점수: <span id="pScore" style="font-size:1.4rem; font-weight:bold;">-</span></p>
                <a href="#" id="searchBtn" class="btn-link" target="_blank">대체 상품 검색</a>
            </div>
        </div>

        <div class="history-section">
            <h4 style="margin-bottom:10px;">🕒 최근 스캔 기록</h4>
            <div id="historyList"></div>
        </div>
    </div>

    <script>
        const html5QrCode = new Html5Qrcode("reader");
        let isScanning = true;

        function onScanSuccess(decodedText) {
            if (!isScanning) return;
            processBarcode(decodedText);
        }

        function searchManual() {
            const code = document.getElementById('manualBarcode').value;
            if (!code) return alert("숫자를 입력해주세요.");
            processBarcode(code);
        }

        function processBarcode(barcode) {
            isScanning = false;
            html5QrCode.pause();
            const box = document.getElementById('resultBox');
            box.style.display = 'block';
            document.getElementById('pName').innerText = "분석 중...";

            fetch(`/api/scan?barcode=${barcode}`)
                .then(res => res.json())
                .then(data => {
                    if(data.success) {
                        updateUI(data);
                        saveHistory(data.productName, data.score);
                    } else {
                        document.getElementById('pName').innerText = "정보 없음";
                    }
                    setTimeout(() => { isScanning = true; html5QrCode.resume(); }, 4000);
                })
                .catch(() => { alert("통신 에러"); isScanning = true; html5QrCode.resume(); });
        }

        function updateUI(data) {
            const box = document.getElementById('resultBox');
            document.getElementById('pName').innerText = data.productName;
            document.getElementById('pBad').innerText = data.badIngredients.length > 0 ? data.badIngredients.join(", ") : "없음";
            document.getElementById('pScore').innerText = data.score + "점";
            
            // 신호등 색상 로직 (10번 크로스 체크 반영)
            box.className = 'result-box ' + (data.score >= 80 ? 'good' : (data.score >= 50 ? 'soso' : 'bad'));
            
            const sBtn = document.getElementById('searchBtn');
            sBtn.href = `https://www.google.com/search?q=${encodeURIComponent(data.productName + " 대체품")}`;
            sBtn.style.display = 'block';
        }

        function saveHistory(name, score) {
            let history = JSON.parse(localStorage.getItem('foodHistory') || '[]');
