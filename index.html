<script>
    function onScanSuccess(decodedText, decodedResult) {
        if (!isScanning) return;
        isScanning = false;
        
        html5QrCode.pause();
        resultBox.style.display = 'block';
        productNameEl.innerText = "바코드(" + decodedText + ") 자체 서버 조회 중...";
        
        // 외부 API가 아닌 우리가 Vercel에 만든 자체 백엔드(/api/scan)로 요청 전송
        fetch(`/api/scan?barcode=${decodedText}`)
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    productNameEl.innerText = data.productName;
                    
                    if (data.badIngredients.length > 0) {
                        badListEl.innerText = data.badIngredients.join(", ");
                        googleSearchBtn.href = "https://www.google.com/search?q=" + encodeURIComponent(data.productName + " 대체품");
                        googleSearchBtn.style.display = 'block';
                    } else {
                        badListEl.innerText = "위험 성분 없음";
                    }
                    scoreEl.innerText = data.score + " / 100 점";
                } else {
                    productNameEl.innerText = data.message;
                    badListEl.innerText = "-";
                    scoreEl.innerText = "-";
                }
                
                setTimeout(() => { 
                    isScanning = true; 
                    html5QrCode.resume(); 
                }, 3000);
            })
            .catch(err => {
                productNameEl.innerText = "백엔드 서버 접속 실패입니다.";
                setTimeout(() => { 
                    isScanning = true; 
                    html5QrCode.resume(); 
                }, 3000);
            });
    }
</script>
