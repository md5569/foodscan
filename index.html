<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>식품 안전 스캐너 Pro</title>
    <style>
        :root { --primary: #1a365d; --success: #48bb78; --warning: #ed8936; --danger: #f56565; }
        body { font-family: -apple-system, sans-serif; background: #f0f4f8; margin: 0; padding: 15px; }
        .card { background: #fff; border-radius: 20px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-bottom: 20px; }
        #reader { width: 100%; border-radius: 15px; overflow: hidden; background: #000; border: 4px solid var(--primary); }
        .input-group { display: flex; gap: 10px; margin: 15px 0; }
        input { flex: 1; padding: 12px; border: 2px solid #cbd5e0; border-radius: 10px; font-size: 16px; }
        .btn { padding: 12px 20px; background: var(--primary); color: #fff; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .result-box { display: none; padding: 20px; border-radius: 15px; color: white; transition: 0.3s; }
        .good { background: var(--success); } .soso { background: var(--warning); } .bad { background: var(--danger); }
        .history-item { display: flex; justify-content: space-between; padding: 12px; background: #fff; border-radius: 10px; margin-bottom: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    </style>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>
    <div class="card">
        <h2 style="text-align:center; color:var(--primary);">🔍 AI 식품 스캐너</h2>
        <div id="reader"></div>
        <div class="input-group">
            <input type="number" id="manualBarcode" placeholder="바코드 직접 입력" inputmode="numeric">
            <button class="btn" onclick="searchManual()">조회</button>
        </div>
        <div id="resultBox" class="result-box">
            <h3 id="pName" style="margin:0 0 10px 0;">상품명</h3>
            <p>⚠️ 첨가물: <span id="pBad">-</span></p>
            <p>⭐ 안전점수: <span id="pScore" style="font-size:1.5rem; font-weight:bold;">-</span></p>
            <a href="#" id="webSearch" class="btn" target="_blank" style="display:none; background:rgba(255,255,255,0.3); text-decoration:none; text-align:center; margin-top:10px;">웹에서 상세정보 찾기</a>
        </div>
    </div>
    <div id="historySection">
        <h4 style="margin-left:10px;">🕒 최근 기록</h4>
        <div id="historyList"></div>
    </div>

    <script>
        const html5QrCode = new Html5Qrcode("reader");
        let isScanning = true;

        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
            if(isScanning) processBarcode(text);
        }).catch(() => alert("카메라 권한 필요"));

        function searchManual() {
            const val = document.getElementById('manualBarcode').value;
            if(val) processBarcode(val);
        }

        function processBarcode(barcode) {
            isScanning = false;
            const box = document.getElementById('resultBox');
            box.style.display = "block";
            document.getElementById('pName').innerText = "분석 중...";

            fetch(`/api/scan?barcode=${barcode}`)
                .then(res => res.json())
                .then(data => {
                    const btn = document.getElementById('webSearch');
                    btn.href = `https://www.google.com/search?q=${barcode}+상품정보`;
                    btn.style.display = "block";

                    if(data.success) {
                        document.getElementById('pName').innerText = data.productName;
                        document.getElementById('pBad').innerText = data.badIngredients.join(", ") || "없음";
                        document.getElementById('pScore').innerText = data.score + "점";
                        box.className = "result-box " + (data.score >= 80 ? "good" : (data.score >= 50 ? "soso" : "bad"));
                        addHistory(data.productName, data.score);
                    } else {
                        box.className = "result-box bad";
                        document.getElementById('pName').innerText = "조회 불가 상품";
                        document.getElementById('pBad').innerText = "데이터 없음";
                        document.getElementById('pScore').innerText = "확인 필요";
                    }
                    setTimeout(() => { isScanning = true; }, 4000);
                });
        }

        function addHistory(name, score) {
            const list = document.getElementById('historyList');
            const item = document.createElement('div');
            item.className = 'history-item';
            item.innerHTML = `<span>${name}</span><strong>${score}점</strong>`;
            list.prepend(item);
        }
    </script>
</body>
</html>
